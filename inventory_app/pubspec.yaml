name: inventory_app
description: نظام إدارة المخزون - ساحة المجد

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_localizations:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.3
  
  # UI & Styling
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_staggered_animations: ^1.0.0
  cached_network_image: ^3.3.1
  
  # Utilities
  mobile_scanner: ^5.1.0
  provider: ^6.1.2
  image_picker: ^1.0.7
  intl: 0.20.2
  pdf: ^3.10.7
  printing: ^5.12.0
  barcode_widget: ^2.0.4
  http: ^1.2.1
  html: ^0.15.4
  excel: ^4.0.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
